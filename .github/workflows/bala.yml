name: Deploy Static Site

on:
  push:
    branches:
      - main

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload Files
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./

      - name: Deploy Site
        uses: actions/deploy-pages@v4
